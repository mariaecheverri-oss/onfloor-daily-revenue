services:
  - type: web
    name: onfloor-daily-revenue
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn daily_revenue:app
    envVars:
      - key: HUBSPOT_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: TRIGGER_SECRET
        sync: false
